<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Codex Usage Tracker</title>
  <link rel="stylesheet" href="./styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3"></script>
  <script src="./config.js"></script>
</head>
<body>
  <main class="container">
    <header class="page-header">
      <h1>Codex Usage Tracker</h1>
      <p>Record and visualize 5h / 7d usage snapshots.</p>
    </header>

    <section class="card" id="statusCard">
      <p id="statusText">Initializing...</p>
      <p id="message" class="message" aria-live="polite"></p>
    </section>

    <section class="card" id="authCard">
      <h2>Single Account Sign-in</h2>
      <div class="auth-grid">
        <form id="signinForm" class="form-stack">
          <h3>Sign in</h3>
          <label>
            ID (email)
            <input id="signinEmail" type="email" required autocomplete="email" />
          </label>
          <label>
            Password
            <input id="signinPassword" type="password" required autocomplete="current-password" />
          </label>
          <button type="submit">Sign in</button>
        </form>
      </div>
    </section>

    <section class="card hidden" id="appCard">
      <div class="toolbar">
        <strong id="userEmail"></strong>
        <div class="toolbar-actions">
          <button id="exportCsvBtn" type="button" class="button-secondary">Export CSV Backup</button>
          <button id="compactBtn" type="button" class="button-secondary">Review Redundant Middle Snapshots</button>
          <button id="signoutBtn" type="button">Sign out</button>
        </div>
      </div>

      <div class="toolbar">
        <div>
          <h3>Current 4-Week Window</h3>
          <p id="windowLabel" class="section-note">-</p>
        </div>
        <div class="toolbar-actions">
          <button id="prevWindowBtn" type="button" class="button-secondary">Previous 4 Weeks</button>
          <button id="nextWindowBtn" type="button" class="button-secondary">Next 4 Weeks</button>
        </div>
      </div>

      <div class="charts">
        <article class="chart-card">
          <h3>Usage Percentage</h3>
          <div class="canvas-wrap">
            <canvas id="percentChart"></canvas>
          </div>
        </article>
      </div>

      <h3>Snapshots In Window <span id="windowCount" class="inline-note">0</span></h3>
      <div class="table-wrap">
        <table id="snapshotTable">
          <thead>
            <tr>
              <th>Time</th>
              <th>5h %</th>
              <th>7d %</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>

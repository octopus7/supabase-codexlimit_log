<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Codex Monthly Usage Chart</title>
  <link rel="stylesheet" href="./styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3"></script>
</head>
<body>
  <main class="monthly-container">
    <section class="card monthly-card">
      <div class="monthly-select-row">
        <label class="window-mode-control monthly-select-control" for="monthSelect">
          <span>Month</span>
          <select id="monthSelect" disabled>
            <option>Loading...</option>
          </select>
        </label>
      </div>

      <div class="charts">
        <article class="chart-card monthly-chart-card">
          <h3>Usage Percentage</h3>
          <div class="canvas-wrap">
            <canvas id="percentChart"></canvas>
          </div>
          <p id="message" class="message" aria-live="polite"></p>
        </article>
      </div>
    </section>
  </main>

  <script src="./monthly.js"></script>
</body>
</html>
